<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Min tillgänglighet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    #app { width: 100%; max-width: 900px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .top-bar h2 { font-size: 18px; }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    #week-label { font-weight: bold; font-size: 15px; }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .schedule-table th {
      background: #3b5bdb;
      color: white;
      padding: 12px 8px;
      text-align: center;
      font-size: 13px;
    }

    .schedule-table th .day-name { font-size: 14px; font-weight: bold; }
    .schedule-table th .day-date { font-size: 11px; opacity: 0.85; }

    .schedule-table td {
      text-align: center;
      padding: 10px 6px;
      border-bottom: 1px solid #eee;
      border-right: 1px solid #eee;
      font-size: 13px;
    }

    .schedule-table td:first-child {
      font-weight: bold;
      background: #f8f8f8;
      text-align: left;
      padding-left: 14px;
      min-width: 110px;
    }

    .schedule-table tr:last-child td { border-bottom: none; }

    .status-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .status-btn.available   { background: #d3f9d8; color: #2b8a3e; }
    .status-btn.unavailable { background: #ffe3e3; color: #c92a2a; }
    .status-btn.not-set     { background: #e9ecef; color: #868e96; }

    .shift-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #3b5bdb; }
    .shift-checkbox:disabled { opacity: 0.3; cursor: default; }

    .save-bar {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary   { background: #3b5bdb; color: white; }
    .btn-primary:hover { background: #2f4cbf; }
    .btn-secondary { background: #e9ecef; color: #333; }
    .btn-secondary:hover { background: #dee2e6; }
    .btn-danger    { background: #ffe3e3; color: #c92a2a; }

    #save-status { font-size: 13px; color: #2b8a3e; }

    #no-token {
      background: white;
      padding: 24px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #no-token a { color: #3b5bdb; }
  </style>
</head>
<body>
<div id="app">

  <div id="no-token" style="display:none">
    <p>Du är inte inloggad. <a href="/index.html">Logga in här</a>.</p>
  </div>

  <div id="schedule-section" style="display:none">
    <div class="top-bar">
      <h2>Min tillgänglighet</h2>
      <button class="btn-danger" onclick="logout()">Logga ut</button>
    </div>

    <div class="week-nav">
      <button class="btn-secondary" onclick="changeWeek(-1)">&#8592; Föregående</button>
      <span id="week-label"></span>
      <button class="btn-secondary" onclick="changeWeek(1)">Nästa &#8594;</button>
    </div>

    <table class="schedule-table">
      <thead>
        <tr id="day-headers"><th></th></tr>
      </thead>
      <tbody>
        <tr id="row-status"><td>Status</td></tr>
        <tr id="row-morning"><td>Morgon</td></tr>
        <tr id="row-afternoon"><td>Eftermiddag</td></tr>
        <tr id="row-night"><td>Natt</td></tr>
      </tbody>
    </table>

    <div class="save-bar">
      <span id="save-status"></span>
      <button class="btn-primary" onclick="saveAvailability()">Spara</button>
    </div>
  </div>

</div>
<script src="/schedule.js"></script>
</body>
</html>
